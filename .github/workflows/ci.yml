name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Execute benchmark smoke notebook
        env:
          NSIM: '200'
          N_EXP: '3'
          R_LIST: '[128,256,512]'
        run: jupyter nbconvert --to notebook --execute notebooks/01_algorithm_benchmark.ipynb --ExecutePreprocessor.kernel_name=python3 --output 01_algorithm_benchmark.executed.ipynb
      - uses: actions/upload-artifact@v4
        with:
          name: executed-benchmark-notebook
          path: notebooks/01_algorithm_benchmark.executed.ipynb
